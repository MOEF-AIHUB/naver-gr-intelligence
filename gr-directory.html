<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국회의원 · 비서관 연락처 DB</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{--g:#03C75A;--bl:#1C6EF2;--rd:#D94F3B;--gd:#E8A838;--pu:#8B5CF6;--bg:#0A1628;--cd:#111E30;--cd2:#162030;--br:#1E3048;--tx:#D8E8F5;--mt:#5A7A9A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:13px}
header{background:#0A1628;border-bottom:1px solid var(--br);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.logo{display:flex;align-items:center;gap:10px}
.logo-n{background:linear-gradient(135deg,#03C75A,#00A847);color:#fff;font-weight:900;font-size:15px;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center}
a.back{background:var(--cd);border:1px solid var(--br);border-radius:7px;padding:5px 12px;color:var(--mt);font-size:11px;cursor:pointer;text-decoration:none}
a.back:hover{color:var(--g);border-color:var(--g)}
/* SEARCH BAR */
.search-bar{background:var(--cd);border-bottom:1px solid var(--br);padding:14px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:90}
.search-main{flex:1;min-width:260px;background:var(--cd2);border:1px solid var(--br);border-radius:8px;padding:9px 14px;color:var(--tx);font-size:13px;outline:none;transition:.2s}
.search-main:focus{border-color:var(--g);box-shadow:0 0 0 2px rgba(3,199,90,.15)}
.search-main::placeholder{color:var(--mt)}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.fb{background:var(--cd2);border:1px solid var(--br);border-radius:20px;padding:4px 12px;color:var(--mt);font-size:10px;cursor:pointer;white-space:nowrap;transition:.15s}
.fb:hover{border-color:var(--mt)}
.fb.on{border-color:var(--g);color:var(--g);background:rgba(3,199,90,.08)}
.result-count{font-size:11px;color:var(--mt);white-space:nowrap}
/* MAIN LAYOUT */
.layout{display:grid;grid-template-columns:1fr 380px;height:calc(100vh - 112px)}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
/* TABLE AREA */
.table-area{overflow-y:auto;scrollbar-width:thin}
.table-area::-webkit-scrollbar{width:4px}
.table-area::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:10;background:#0D1E30}
thead th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--mt);border-bottom:2px solid var(--br);white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;cursor:pointer;user-select:none}
thead th:hover{color:var(--g)}
thead th.sort-asc::after{content:" ↑";color:var(--g)}
thead th.sort-desc::after{content:" ↓";color:var(--g)}
tbody tr{cursor:pointer;transition:.1s;border-bottom:1px solid var(--br)}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr.selected{background:rgba(3,199,90,.06)!important;border-left:2px solid var(--g)}
td{padding:9px 12px;font-size:11px;vertical-align:middle}
.td-role{white-space:nowrap}
.role-chair{color:var(--gd);font-weight:700;font-size:10px}
.role-sec{color:var(--bl);font-weight:700;font-size:10px}
.role-mem{color:var(--mt);font-size:10px}
.party-d{color:#4FC3F7;font-size:10px;font-weight:600}
.party-p{color:#EF9A9A;font-size:10px;font-weight:600}
.party-o{color:#CE93D8;font-size:10px;font-weight:600}
.cmit-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap;display:inline-block}
.cmit-gr{background:rgba(217,79,59,.15);color:#FF8080;border:1px solid rgba(217,79,59,.2)}
.cmit-norm{background:rgba(90,122,154,.15);color:var(--mt)}
.tel-link{color:var(--bl);text-decoration:none;font-weight:600;font-size:11px}
.tel-link:hover{color:var(--g)}
.name-cell{font-weight:700;font-size:12px}
/* DETAIL PANEL */
.detail-panel{background:var(--cd);border-left:1px solid var(--br);overflow-y:auto;scrollbar-width:thin}
.detail-panel::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--mt);font-size:12px;gap:10px;padding:30px}
.detail-body{padding:18px}
.d-header{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--br)}
.d-name{font-size:18px;font-weight:900;margin-bottom:5px}
.d-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.d-section{margin-bottom:14px}
.d-label{font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.d-tel-big{font-size:22px;font-weight:900;color:var(--g);letter-spacing:1px;margin-bottom:4px}
.d-copy{background:rgba(3,199,90,.1);border:1px solid rgba(3,199,90,.3);border-radius:6px;padding:4px 10px;color:var(--g);font-size:10px;cursor:pointer;margin-left:8px}
.d-copy:hover{background:rgba(3,199,90,.2)}
.staff-grid{display:flex;flex-direction:column;gap:6px}
.staff-item{background:var(--cd2);border:1px solid var(--br);border-radius:7px;padding:10px}
.staff-role{font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.staff-names{display:flex;flex-wrap:wrap;gap:5px}
.staff-name{font-size:11px;font-weight:600;background:var(--bg);border:1px solid var(--br);border-radius:5px;padding:3px 8px;cursor:pointer;transition:.15s}
.staff-name:hover{border-color:var(--g);color:var(--g)}
.ai-btn{width:100%;margin-top:12px;background:linear-gradient(135deg,var(--g),#00A847);border:none;border-radius:8px;padding:10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.ai-btn:hover{opacity:.9}
/* TAGS */
.tag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600}
.tag-d{background:rgba(79,195,247,.15);color:#4FC3F7}
.tag-p{background:rgba(239,154,154,.15);color:#EF9A9A}
.tag-o{background:rgba(206,147,216,.15);color:#CE93D8}
/* STATS BAR */
.stats-bar{background:var(--cd2);border-bottom:1px solid var(--br);padding:8px 20px;display:flex;gap:16px;font-size:10px;color:var(--mt)}
.stat-item{display:flex;align-items:center;gap:5px}
.stat-dot{width:7px;height:7px;border-radius:50%}
/* GR ALERT */
.gr-issues{background:rgba(217,79,59,.06);border:1px solid rgba(217,79,59,.2);border-radius:7px;padding:10px;margin-top:10px}
.gr-label{font-size:9px;font-weight:700;color:var(--rd);margin-bottom:6px}
.gr-issue{font-size:10px;padding:3px 0;border-bottom:1px solid rgba(217,79,59,.1);color:var(--tx)}
.gr-issue:last-child{border-bottom:none}
/* HIGHLIGHT */
mark{background:rgba(3,199,90,.25);color:var(--g);border-radius:3px;padding:0 2px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-n">N</div>
    <div>
      <div style="font-size:13px;font-weight:700">국회의원 · 비서관 연락처 DB</div>
      <div style="font-size:10px;color:var(--mt)">22대 국회 전체 521명 · 보좌관·비서관 포함</div>
    </div>
  </div>
  <a href="index.html" class="back">← 메인으로</a>
</header>

<div class="search-bar">
  <input class="search-main" id="searchInput" placeholder="🔍 의원명, 비서관명, 위원회, 선거구, 전화번호 검색..." oninput="doSearch()" autocomplete="off">
  <div class="filter-group" id="partyFilters">

    <button class="fb" onclick="setParty('국민의힘',this)" style="color:#EF9A9A">국민의힘</button>

  <div class="filter-group" id="cmitFilters">

    <button class="fb" onclick="setCmit('정무위원회',this)" style="color:var(--rd)">정무위</button>
    <button class="fb" onclick="setCmit('과학기술정보방송통신위원회',this)" style="color:var(--bl)">과방위</button>
    <button class="fb" onclick="setCmit('문화체육관광위원회',this)" style="color:var(--gd)">문체위</button>
    <button class="fb" onclick="setCmit('외교통일위원회',this)" style="color:var(--teal,#0EA5E9)">외통위</button>
    <button class="fb" onclick="setCmit('법제사법위원회',this)">법사위</button>
    <button class="fb" onclick="setCmit('재정경제기획위원회',this)">기재위</button>
    <button class="fb" onclick="setCmit('산업통상자원중소벤처기업위원회',this)">산자위</button>
    <button class="fb" onclick="setCmit('GR핵심',this)" style="color:var(--rd);border-color:rgba(217,79,59,.4)">🔴 GR 핵심만</button>
  </div>
  <div class="result-count" id="resultCount">521명</div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-item"><div class="stat-dot" style="background:#4FC3F7"></div><span id="sCnt">민주당 –</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#EF9A9A"></div><span id="pCnt">국민의힘 –</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#CE93D8"></div><span id="oCnt">기타 –</span></div>
  <div class="stat-item" style="margin-left:auto"><span style="color:var(--rd)">● GR 핵심 위원회: 정무위·과방위·문체위·외통위·법사위·기재위·산자위</span></div>
</div>

<div class="layout">
  <div class="table-area" id="tableArea">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('role')" style="width:60px">구성</th>
          <th onclick="sortBy('name')" style="width:70px">의원명</th>
          <th onclick="sortBy('party')" style="width:70px">정당</th>
          <th onclick="sortBy('cmit')">위원회</th>
          <th onclick="sortBy('district')">선거구</th>
          <th onclick="sortBy('tel')" style="width:110px">전화번호</th>
          <th style="width:130px">보좌관</th>
          <th style="width:130px">선임비서관</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <div style="font-size:32px">👤</div>
      <div>의원을 클릭하면 상세 정보가 표시됩니다</div>
      <div style="font-size:10px">비서관·보좌관 전체 명단 포함</div>
    </div>
  </div>
</div>

// ═══ SEARCH ═══
function doSearch(){
  currentSearch = document.getElementById('searchInput').value.trim();
  render();
}
function setParty(p,el){
  currentParty=p;
  document.querySelectorAll('#partyFilters .fb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}
function setCmit(c,el){
  currentCmit=c;
  document.querySelectorAll('#cmitFilters .fb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}
function sortBy(key){
  if(sortKey===key) sortDir*=-1; else {sortKey=key;sortDir=1;}
  document.querySelectorAll('thead th').forEach(th=>{th.classList.remove('sort-asc','sort-desc');});
  const ths=document.querySelectorAll('thead th');
  const keys=['role','name','party','cmit','district','tel'];
  const idx=keys.indexOf(key);
  if(idx>=0){ths[idx].classList.add(sortDir===1?'sort-asc':'sort-desc');}
  render();
}

// ═══ FILTER ═══
function getFiltered(){
  let list=[...RAW];
  if(currentParty!=='all'){
    if(currentParty==='기타') list=list.filter(r=>r.party!=='더불어민주당'&&r.party!=='국민의힘');
    else list=list.filter(r=>r.party===currentParty);
  }
  if(currentCmit==='GR핵심') list=list.filter(r=>GR_CMITS.includes(r.cmit));
  else if(currentCmit!=='all') list=list.filter(r=>r.cmit===currentCmit);
  if(currentSearch){
    const q=currentSearch.toLowerCase();
    list=list.filter(r=>
      r.name.includes(currentSearch)||r.cmit.includes(currentSearch)||
      r.party.includes(currentSearch)||r.district.includes(currentSearch)||
      r.tel.includes(currentSearch)||r.chief_sec.includes(currentSearch)||
      r.sr_sec.includes(currentSearch)||r.sec.includes(currentSearch)||
      r.role.includes(currentSearch)
    );
  }
  if(sortKey){
    list.sort((a,b)=>{
      const av=a[sortKey]||'', bv=b[sortKey]||'';
      return av.localeCompare(bv,'ko')*sortDir;
    });
  }
  return list;
}

function highlight(text){
  if(!currentSearch) return text;
  const escaped=currentSearch.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(escaped,'gi'),m=>`<mark>${m}</mark>`);
}

  const roleClass=r=>r==='위원장'?'role-chair':r==='간사'?'role-sec':'role-mem';
  const cmitShort=c=>{
    const map={'과학기술정보방송통신위원회':'과방위','국회운영위원회':'운영위','기후에너지환경노동위원회':'기후에너지위','농림축산식품해양수산위원회':'농해수위','산업통상자원중소벤처기업위원회':'산자중기위','성평등가족위원회':'성평등위','순직 해병 수사 방해 및 사건 은폐 등의 진실규명을 위한 국정조사특별위원회':'해병특위','윤석열 정권 정치검찰 조작기소 의혹 사건 진상규명 국정조사특별위원회':'검찰특위','윤석열정부의비상계엄선포를통한내란혐의진상규명국정조사특별위원회':'내란특위'};
    return map[c]||c;
  };
  tbody.innerHTML=filtered.map(r=>`
    <tr onclick="selectMember('${r.no}')" id="tr-${r.no}">
      <td class="td-role"><span class="${roleClass(r.role)}">${highlight(r.role)}</span></td>
      <td><span class="name-cell">${highlight(r.name)}</span></td>
      <td><span class="${partyClass(r.party)}">${r.party==='더불어민주당'?'민주':r.party==='국민의힘'?'국힘':r.party}</span></td>
      <td><span class="cmit-badge ${isGR(r)?'cmit-gr':'cmit-norm'}">${highlight(cmitShort(r.cmit))}</span></td>
      <td style="font-size:10px;color:var(--mt)">${highlight(r.district)}</td>
      <td><a class="tel-link" href="tel:${r.tel}">${highlight(r.tel)}</a></td>
      <td style="font-size:10px;color:var(--mt)">${highlight(r.chief_sec)}</td>
      <td style="font-size:10px;color:var(--mt)">${highlight(r.sr_sec)}</td>
    </tr>`).join('');
}

// ═══ STATS ═══
function updateStats(){
  const d=filtered.filter(r=>r.party==='더불어민주당').length;
  const p=filtered.filter(r=>r.party==='국민의힘').length;
  const o=filtered.filter(r=>r.party!=='더불어민주당'&&r.party!=='국민의힘').length;
  document.getElementById('sCnt').textContent=`민주당 ${d}명`;
  document.getElementById('pCnt').textContent=`국민의힘 ${p}명`;
  document.getElementById('oCnt').textContent=`기타 ${o}명`;
}

// ═══ SELECT MEMBER ═══
function selectMember(no){
  const r=RAW.find(x=>x.no===no);if(!r)return;
  // Row highlight
  document.querySelectorAll('tbody tr').forEach(tr=>tr.classList.remove('selected'));
  const tr=document.getElementById('tr-'+no);if(tr)tr.classList.add('selected');
  selectedRow=no;
  const isGR=GR_CMITS.includes(r.cmit);
  const partyColor=r.party==='더불어민주당'?'#4FC3F7':r.party==='국민의힘'?'#EF9A9A':'#CE93D8';
  // Build staff sections
  const staffSections=[];
  if(r.chief_sec){staffSections.push({role:'보좌관',names:r.chief_sec.split(',').map(s=>s.trim()).filter(Boolean)});}
  if(r.sr_sec){staffSections.push({role:'선임비서관',names:r.sr_sec.split(',').map(s=>s.trim()).filter(Boolean)});}
  if(r.sec){staffSections.push({role:'비서관',names:r.sec.split(',').map(s=>s.trim()).filter(Boolean)});}
  // GR issues
  const grIssues=GR_ISSUES[r.cmit]||[];
  document.getElementById('detailPanel').innerHTML=`
    <div class="detail-body">
      <div class="d-header">
        <div class="d-name">${r.name}</div>
        <div class="d-meta">
          <span class="tag" style="background:${partyColor}22;color:${partyColor}">${r.party}</span>
          <span style="font-size:10px;color:var(--mt)">${r.role}</span>
          <span style="font-size:10px;color:var(--mt)">·</span>
          <span style="font-size:10px;color:var(--mt)">${r.district}</span>
          ${isGR?'<span style="font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(217,79,59,.15);color:#FF8080;font-weight:700;border:1px solid rgba(217,79,59,.3)">GR 핵심</span>':''}
        </div>
        <div style="margin-top:6px;font-size:10px;color:var(--mt)">${r.cmit}</div>
      </div>

      <div class="d-section">
        <div class="d-label">📞 의원실 직통</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="d-tel-big">${r.tel}</div>
          <button class="d-copy" onclick="copyText('${r.tel}')">복사</button>
          <a href="tel:${r.tel}" style="background:var(--g);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none">전화</a>
        </div>
      </div>

      <div class="d-section">
        <div class="d-label">👥 보좌진 · 비서관 전체</div>
        <div class="staff-grid">
          ${staffSections.map(s=>`
            <div class="staff-item">
              <div class="staff-role">${s.role} (${s.names.length}명)</div>
              <div class="staff-names">
                ${s.names.map(n=>`<span class="staff-name" onclick="copyText('${n}')" title="클릭하면 이름 복사">${n}</span>`).join('')}
              </div>
            </div>`).join('')}
        </div>
      </div>

      ${isGR?`<div class="gr-issues">
        <div class="gr-label">🚨 이 의원실 GR 관련 이슈</div>
        ${grIssues.map(i=>`<div class="gr-issue">→ ${i}</div>`).join('')}
      </div>`:''}

      <button class="ai-btn" onclick="openAIChat('${r.name}','${r.cmit}','${r.role}')">
        🤖 AI에게 ${r.name} 의원실 브리핑 전략 질문
      </button>

      <div style="margin-top:10px;padding:10px;background:var(--cd2);border-radius:7px;font-size:10px;color:var(--mt);line-height:1.8">
        <b style="color:var(--tx)">📋 연락 시 참고</b><br>
        • 보좌관/선임비서관 = 정책 실무 담당 → 법안 의견서, 입장문 전달<br>
        • 비서관 = 일정·의전 담당 → 면담 요청, 일정 조율<br>
        • 국회 교환 대표번호: 02-788-2114
      </div>
    </div>`;
}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{
    showToast(text+' 복사됨');
  }).catch(()=>{
    const el=document.createElement('textarea');
    el.value=text;document.body.appendChild(el);el.select();
    document.execCommand('copy');document.body.removeChild(el);
    showToast(text+' 복사됨');
  });
}

function openAIChat(name,cmit,role){
  const msg=encodeURIComponent(name+' '+role+'('+cmit+') 의원실 브리핑 전략과 접촉 포인트를 구체적으로 알려줘');
  window.open('index.html#intel?q='+msg,'_blank');
}

function showToast(msg){
  let t=document.getElementById('gr-toast');
  if(!t){t=document.createElement('div');t.id='gr-toast';t.style.cssText='position:fixed;bottom:20px;right:20px;background:var(--cd);border:1px solid var(--g);color:var(--g);padding:8px 14px;border-radius:7px;font-size:11px;font-weight:700;z-index:999;transition:.25s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2000);
}

init();
</script>
</body>
</html>
