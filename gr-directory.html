<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GR 의원 연락처 DB | NVGC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{--g:#03C75A;--bl:#1C6EF2;--rd:#D94F3B;--gd:#E8A838;--pu:#8B5CF6;--bg:#0A1628;--cd:#111E30;--cd2:#162030;--br:#1E3048;--tx:#D8E8F5;--mt:#5A7A9A;--d:#4FC3F7;--p:#EF9A9A;--o:#CE93D8}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:13px}
header{background:#0A1628;border-bottom:1px solid var(--br);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-n{background:linear-gradient(135deg,#03C75A,#00A847);color:#fff;font-weight:900;font-size:15px;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:7px}
a.nb{background:var(--cd);border:1px solid var(--br);border-radius:7px;padding:5px 12px;color:var(--mt);font-size:11px;text-decoration:none;transition:.15s}
a.nb:hover{color:var(--g);border-color:var(--g)}
a.nb.on{color:var(--g);border-color:var(--g);background:rgba(3,199,90,.08)}
/* SEARCH BAR */
.sbar{background:var(--cd);border-bottom:1px solid var(--br);padding:12px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:90}
.sinput{flex:1;min-width:220px;background:var(--cd2);border:1px solid var(--br);border-radius:8px;padding:9px 14px 9px 36px;color:var(--tx);font-size:12px;outline:none}
.sinput:focus{border-color:var(--g)}
.sinput::placeholder{color:var(--mt)}
.swrap{position:relative;flex:1;min-width:220px}
.sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mt)}
.fb{background:var(--cd2);border:1px solid var(--br);border-radius:20px;padding:4px 12px;color:var(--mt);font-size:10px;cursor:pointer;white-space:nowrap;transition:.15s}
.fb:hover{border-color:var(--mt)}
.fb.on{border-color:var(--g);color:var(--g);background:rgba(3,199,90,.08)}
.rcnt{font-size:11px;color:var(--mt);white-space:nowrap;margin-left:auto}
/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr 340px;height:calc(100vh - 104px);overflow:hidden}
@media(max-width:1100px){.layout{grid-template-columns:180px 1fr}}
@media(max-width:800px){.layout{grid-template-columns:1fr}}
/* LEFT */
.lnav{background:var(--cd);border-right:1px solid var(--br);overflow-y:auto;padding:12px}
.lnav::-webkit-scrollbar{width:3px}
.lnav::-webkit-scrollbar-thumb{background:var(--br)}
.lsec{margin-bottom:14px}
.ltitle{font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--br)}
.litem{padding:6px 9px;border-radius:7px;cursor:pointer;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;transition:.15s}
.litem:hover{background:rgba(255,255,255,.04)}
.litem.on{background:rgba(3,199,90,.08);border-left:2px solid var(--g)}
.lname{font-size:11px;font-weight:600}
.lcnt{font-size:9px;color:var(--mt);background:var(--cd2);padding:1px 6px;border-radius:10px}
.litem.on .lcnt{color:var(--g);background:rgba(3,199,90,.15)}
/* CENTER - TABLE */
.center{overflow-y:auto}
.center::-webkit-scrollbar{width:4px}
.center::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:10;background:#0D1E30}
thead th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--mt);border-bottom:2px solid var(--br);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--g)}
tbody tr{cursor:pointer;border-bottom:1px solid var(--br);transition:.1s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr.sel{background:rgba(3,199,90,.06)!important;border-left:2px solid var(--g)}
td{padding:8px 12px;font-size:11px;vertical-align:middle}
.gr-badge{font-size:8px;padding:1px 5px;border-radius:6px;font-weight:700;background:rgba(217,79,59,.15);color:#FF8080;margin-left:4px}
/* RIGHT PANEL */
.rpanel{background:var(--cd);border-left:1px solid var(--br);overflow-y:auto}
.rpanel::-webkit-scrollbar{width:4px}
.rpanel::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.rempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--mt);gap:10px;text-align:center;padding:30px}
.rbody{padding:16px}
/* DETAIL */
.dname{font-size:20px;font-weight:900;margin-bottom:6px}
.dbadges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.dmeta{font-size:10px;color:var(--mt);margin-bottom:12px}
.dtel{font-size:22px;font-weight:900;color:var(--g);letter-spacing:1px}
.dsec{margin-bottom:14px}
.dlabel{font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.staff-block{background:var(--cd2);border:1px solid var(--br);border-radius:7px;padding:10px;margin-bottom:6px}
.staff-rl{font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;margin-bottom:5px}
.staff-names{display:flex;flex-wrap:wrap;gap:5px}
.staff-chip{font-size:11px;font-weight:600;background:var(--bg);border:1px solid var(--br);border-radius:5px;padding:3px 9px;cursor:pointer;transition:.15s}
.staff-chip:hover{border-color:var(--g);color:var(--g)}
.ai-btn{width:100%;margin-top:12px;background:linear-gradient(135deg,var(--g),#00A847);border:none;border-radius:8px;padding:10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.copybtn{background:rgba(3,199,90,.1);border:1px solid rgba(3,199,90,.3);border-radius:6px;padding:3px 9px;color:var(--g);font-size:10px;cursor:pointer;margin-left:8px}
.callbtn{background:var(--g);border:none;border-radius:6px;padding:5px 14px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;margin-left:6px;text-decoration:none;display:inline-block}
.gr-box{background:rgba(217,79,59,.06);border:1px solid rgba(217,79,59,.2);border-radius:7px;padding:10px;margin-top:8px}
.gr-box-title{font-size:9px;font-weight:700;color:var(--rd);margin-bottom:5px}
.gr-issue-item{font-size:10px;padding:3px 0;border-bottom:1px solid rgba(217,79,59,.1);line-height:1.5}
.gr-issue-item:last-child{border-bottom:none}
/* MISC */
.toast{position:fixed;bottom:20px;right:20px;background:var(--cd);border:1px solid var(--g);color:var(--g);padding:8px 14px;border-radius:7px;font-size:11px;font-weight:700;z-index:999;transform:translateY(10px);opacity:0;transition:.25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
mark{background:rgba(3,199,90,.25);color:var(--g);border-radius:2px;padding:0 2px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-n">N</div>
    <div>
      <div style="font-size:13px;font-weight:700">GR 의원 연락처 DB</div>
      <div style="font-size:10px;color:var(--mt)">22대 국회 521명 · 보좌관·비서관 포함</div>
    </div>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nb">⚡ 대시보드</a>
    <a href="gr-map.html" class="nb">🗺 전국 지도</a>
    <a href="gr-directory.html" class="nb on">👤 의원 DB</a>
  </div>
</header>

<div class="sbar">
  <div class="swrap">
    <span class="sicon">🔍</span>
    <input class="sinput" id="q" placeholder="의원명, 비서관명, 위원회, 선거구, 전화번호 검색..." oninput="render()">
  </div>
  <div style="display:flex;gap:5px;flex-wrap:wrap" id="partyBtns">
    <button class="fb on" onclick="setPt('all',this)">전체</button>
    <button class="fb" onclick="setPt('민주',this)" style="color:var(--d)">민주당</button>
    <button class="fb" onclick="setPt('국힘',this)" style="color:var(--p)">국민의힘</button>
    <button class="fb" onclick="setPt('기타',this)" style="color:var(--o)">기타</button>
    <button class="fb" onclick="setPt('GR',this)" style="color:var(--rd)">🔴 GR 핵심만</button>
  </div>
  <div class="rcnt" id="rcnt">521명</div>
</div>

<div class="layout">
  <!-- 왼쪽 네비 -->
  <div class="lnav">
    <div class="lsec">
      <div class="ltitle">위원회</div>
      <div id="cmitNav"></div>
    </div>
    <div class="lsec">
      <div class="ltitle">구성</div>
      <div id="roleNav"></div>
    </div>
  </div>
  <!-- 가운데 테이블 -->
  <div class="center">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('role')">구성</th>
          <th onclick="sortBy('name')">의원명</th>
          <th onclick="sortBy('party')">정당</th>
          <th onclick="sortBy('cmit')">위원회</th>
          <th onclick="sortBy('district')">선거구</th>
          <th onclick="sortBy('tel')">전화번호</th>
          <th>보좌관</th>
          <th>선임비서관</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <!-- 오른쪽 패널 -->
  <div class="rpanel" id="rpanel">
    <div class="rempty">
      <div style="font-size:36px">👤</div>
      <div style="font-size:12px;font-weight:600">의원을 클릭하세요</div>
      <div style="font-size:10px">비서관·보좌관 전체 명단<br>GR 이슈 연결 포함</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let D = [];
async function loadData(){
  try{
    const r = await fetch('members.json');
    D = await r.json();
    buildNav();
    render();
    document.getElementById('loading').style.display='none';
  }catch(e){
    document.getElementById('loading').textContent='데이터 로드 실패. 새로고침 해주세요.';
    console.error(e);
  }
}

const GR_CMITS = ["정무위원회", "과학기술정보방송통신위원회", "문화체육관광위원회", "외교통일위원회", "법제사법위원회", "재정경제기획위원회", "산업통상자원중소벤처기업위원회"];
const CMIT_SHORT = {"정무위원회": "정무위", "과학기술정보방송통신위원회": "과방위", "문화체육관광위원회": "문체위", "외교통일위원회": "외통위", "법제사법위원회": "법사위", "재정경제기획위원회": "기재위", "산업통상자원중소벤처기업위원회": "산자위", "행정안전위원회": "행안위", "교육위원회": "교육위", "국토교통위원회": "국토위", "국방위원회": "국방위", "보건복지위원회": "복지위", "농림축산식품해양수산위원회": "농해수위", "기후에너지환경노동위원회": "기후에너지위", "국회운영위원회": "운영위", "예산결산특별위원회": "예결위", "성평등가족위원회": "성평등위"};
const GR_ISSUES = {
  '정무위원회': ['온플법','수수료 규제','개인정보·AI학습','핀테크 겸업규제'],
  '과학기술정보방송통신위원회': ['AI기본법','라인야후','구글지도 반출','뉴스알고리즘'],
  '문화체육관광위원회': ['AI학습 저작권','언론사 인접권','웹툰 수익배분','아웃링크'],
  '외교통일위원회': ['라인야후 지배구조','한미통상','USTR 비관세장벽'],
  '법제사법위원회': ['온플법 법사위 통과','과징금 위헌 논거'],
  '재정경제기획위원회': ['디지털세','글로벌최저한세'],
  '산업통상자원중소벤처기업위원회': ['수수료 규제','소상공인 지원'],
};

let curParty='all', curCmit='all', curRole='all', curSort='', curDir=1, selNo=null;

function hl(t){
  const q=document.getElementById('q').value.trim();
  if(!q||!t) return t||'';
  try{
    const safe=q.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&');
    return String(t).replace(new RegExp(safe,'gi'),m=>'<mark>'+m+'</mark>');
  }catch(e){return String(t||'');}
}
function pc(p){return p==='더불어민주당'?'var(--d)':p==='국민의힘'?'var(--p)':'var(--o)';}
function ps(p){return p==='더불어민주당'?'민주':p==='국민의힘'?'국힘':p;}
function cs(c){return CMIT_SHORT[c]||c;}
function isGR(cmit){return GR_CMITS.includes(cmit);}

function getFiltered(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  let list=[...D];
  if(curParty==='민주') list=list.filter(r=>r.party==='더불어민주당');
  else if(curParty==='국힘') list=list.filter(r=>r.party==='국민의힘');
  else if(curParty==='기타') list=list.filter(r=>r.party!=='더불어민주당'&&r.party!=='국민의힘');
  else if(curParty==='GR') list=list.filter(r=>isGR(r.cmit));
  if(curCmit!=='all') list=list.filter(r=>r.cmit===curCmit);
  if(curRole!=='all') list=list.filter(r=>r.role===curRole);
  if(q) list=list.filter(r=>[r.name,r.cmit,r.party,r.district,r.tel,r.chief_sec,r.sr_sec,r.sec].join(' ').toLowerCase().includes(q));
  if(curSort) list.sort((a,b)=>((a[curSort]||'').localeCompare(b[curSort]||'','ko'))*curDir);
  return list;
}

function render(){
  const list=getFiltered();
  document.getElementById('rcnt').textContent=list.length+'명';
  const rows=list.map(r=>{
    const gr=isGR(r.cmit);
    const pcolor=pc(r.party);
    const rStyle=r.role==='위원장'?'color:var(--gd);font-weight:700':r.role==='간사'?'color:var(--bl);font-weight:700':'color:var(--mt)';
    return '<tr onclick="sel(\''+r.no+'\')" id="tr-'+r.no+'"'+(selNo===r.no?' class="sel"':'')+'>'+
      '<td style="'+rStyle+'">'+hl(r.role)+'</td>'+
      '<td style="font-weight:700">'+hl(r.name)+(gr?'<span class="gr-badge">GR</span>':'')+'</td>'+
      '<td style="color:'+pcolor+';font-size:10px">'+ps(r.party)+'</td>'+
      '<td style="font-size:10px"><span style="background:rgba(90,122,154,.15);padding:1px 5px;border-radius:6px">'+hl(cs(r.cmit))+'</span></td>'+
      '<td style="font-size:10px;color:var(--mt)">'+hl(r.district)+'</td>'+
      '<td><a href="tel:'+r.tel+'" style="color:var(--bl);font-weight:700;font-size:11px;text-decoration:none">'+hl(r.tel)+'</a></td>'+
      '<td style="font-size:10px;color:var(--mt)">'+hl(r.chief_sec)+'</td>'+
      '<td style="font-size:10px;color:var(--mt)">'+hl(r.sr_sec)+'</td>'+
      '</tr>';
  }).join('');
  document.getElementById('tbody').innerHTML=rows||'<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--mt)">검색 결과 없음</td></tr>';
}

function sortBy(k){
  if(curSort===k) curDir*=-1; else{curSort=k;curDir=1;}
  document.querySelectorAll('thead th').forEach(t=>t.style.color='');
  render();
}
function setPt(p,el){
  curParty=p;
  document.querySelectorAll('#partyBtns .fb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}
function setCmit(c){
  curCmit=c;
  document.querySelectorAll('#cmitNav .litem').forEach(el=>el.classList.remove('on'));
  document.getElementById('cn-'+c)?.classList.add('on');
  render();
}
function setRole(r){
  curRole=r;
  document.querySelectorAll('#roleNav .litem').forEach(el=>el.classList.remove('on'));
  document.getElementById('rn-'+r)?.classList.add('on');
  render();
}

function sel(no){
  selNo=no;
  document.querySelectorAll('tbody tr').forEach(t=>t.classList.remove('sel'));
  document.getElementById('tr-'+no)?.classList.add('sel');
  const r=D.find(x=>x.no===no);
  if(!r) return;
  showDetail(r);
}

function showDetail(r){
  const pcolor=pc(r.party);
  const gr=isGR(r.cmit);
  const issues=GR_ISSUES[r.cmit]||[];
  
  // Build staff sections safely
  function staffSection(label, names){
    if(!names) return '';
    const chips=names.split(',').map(n=>n.trim()).filter(Boolean)
      .map(n=>'<span class="staff-chip" onclick="cp(\''+n+'\')" title="클릭=복사">'+n+'</span>').join('');
    return '<div class="staff-block"><div class="staff-rl">'+label+'</div><div class="staff-names">'+chips+'</div></div>';
  }
  
  const telHtml=r.tel
    ? '<span class="dtel">'+r.tel+'</span>'
      +'<button class="copybtn" onclick="cp(\''+r.tel+'\')">복사</button>'
      +'<a class="callbtn" href="tel:'+r.tel+'">전화</a>'
    : '<span style="color:var(--mt)">정보 없음</span>';
  
  const grHtml=gr&&issues.length
    ? '<div class="gr-box"><div class="gr-box-title">🚨 GR 관련 이슈</div>'
      +issues.map(i=>'<div class="gr-issue-item">→ '+i+'</div>').join('')
      +'</div>'
    : '';
  
  const roleColor=r.role==='위원장'?'var(--gd)':r.role==='간사'?'var(--bl)':'var(--mt)';
  const roleStyle='background:rgba(90,122,154,.15);color:'+roleColor+';font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700';
  
  document.getElementById('rpanel').innerHTML=
    '<div class="rbody">'
    +'<div class="dname">'+r.name+'</div>'
    +'<div class="dbadges">'
    +'<span style="background:'+pcolor+'15;color:'+pcolor+';font-size:10px;padding:2px 9px;border-radius:10px;font-weight:700">'+r.party+'</span>'
    +'<span style="'+roleStyle+'">'+r.role+'</span>'
    +(gr?'<span style="background:rgba(217,79,59,.15);color:#FF8080;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;border:1px solid rgba(217,79,59,.3)">GR 핵심</span>':'')
    +'</div>'
    +'<div class="dmeta">'+r.cmit+' · '+r.district+'</div>'
    +'<div class="dsec"><div class="dlabel">📞 의원실 직통</div>'
    +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+telHtml+'</div></div>'
    +staffSection('보좌관',r.chief_sec)
    +staffSection('선임비서관',r.sr_sec)
    +staffSection('비서관',r.sec)
    +grHtml
    +'<button class="ai-btn" onclick="goAI(\''+r.name+'\',\''+r.cmit+'\')">🤖 AI에게 '+r.name+' 의원실 GR 전략 질문</button>'
    +'<div style="margin-top:10px;padding:9px;background:var(--cd2);border-radius:7px;font-size:10px;color:var(--mt);line-height:1.8">'
    +'<b style="color:var(--tx)">📋 연락 요령</b><br>보좌관·선임비서관 = 정책 실무, 의견서 전달<br>비서관 = 면담 요청, 일정 조율<br>국회 대표번호: 02-788-2114'
    +'</div></div>';
}

function goAI(name,cmit){
  window.open('index.html','_blank');
}
function cp(t){
  navigator.clipboard.writeText(t).catch(()=>{
    const el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
  });
  showToast(t+' 복사됨');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Build left nav
function buildNav(){
  // Committees
  const cmitCounts={};
  D.forEach(r=>{cmitCounts[r.cmit]=(cmitCounts[r.cmit]||0)+1;});
  const grCmits=GR_CMITS.filter(c=>cmitCounts[c]);
  const otherCmits=Object.keys(cmitCounts).filter(c=>!GR_CMITS.includes(c)).sort();
  
  let html='<div class="litem on" id="cn-all" onclick="setCmit(\'all\')"><span class="lname">전체</span><span class="lcnt">'+D.length+'</span></div>';
  html+='<div style="font-size:9px;color:var(--rd);margin:6px 0 3px;font-weight:700">GR 핵심</div>';
  grCmits.forEach(c=>{
    html+='<div class="litem" id="cn-'+c+'" onclick="setCmit(\''+c+'\')"><span class="lname" style="font-size:10px">'+CMIT_SHORT[c]+'</span><span class="lcnt">'+cmitCounts[c]+'</span></div>';
  });
  html+='<div style="font-size:9px;color:var(--mt);margin:6px 0 3px;font-weight:700">기타</div>';
  otherCmits.forEach(c=>{
    html+='<div class="litem" id="cn-'+c+'" onclick="setCmit(\''+c+'\')"><span class="lname" style="font-size:10px">'+(CMIT_SHORT[c]||c)+'</span><span class="lcnt">'+cmitCounts[c]+'</span></div>';
  });
  document.getElementById('cmitNav').innerHTML=html;
  
  // Roles
  const roles=['위원장','간사','위원'];
  let rhtml='<div class="litem on" id="rn-all" onclick="setRole(\'all\')"><span class="lname">전체</span><span class="lcnt">'+D.length+'</span></div>';
  roles.forEach(r=>{
    const cnt=D.filter(x=>x.role===r).length;
    rhtml+='<div class="litem" id="rn-'+r+'" onclick="setRole(\''+r+'\')"><span class="lname">'+r+'</span><span class="lcnt">'+cnt+'</span></div>';
  });
  document.getElementById('roleNav').innerHTML=rhtml;
}
