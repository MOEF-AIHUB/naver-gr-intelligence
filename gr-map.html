:root{--g:#03C75A;--bl:#1C6EF2;--rd:#D94F3B;--gd:#E8A838;--pu:#8B5CF6;--bg:#0A1628;--cd:#111E30;--cd2:#162030;--br:#1E3048;--tx:#D8E8F5;--mt:#5A7A9A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:13px;overflow:hidden}
header{background:#0A1628;border-bottom:1px solid var(--br);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;z-index:200;position:relative}
.logo{display:flex;align-items:center;gap:10px}
.logo-n{background:linear-gradient(135deg,#03C75A,#00A847);color:#fff;font-weight:900;font-size:15px;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:7px}
a.nb{background:var(--cd);border:1px solid var(--br);border-radius:7px;padding:5px 12px;color:var(--mt);font-size:11px;text-decoration:none;transition:.15s}
a.nb:hover{color:var(--g);border-color:var(--g)}
a.nb.on{color:var(--g);border-color:var(--g);background:rgba(3,199,90,.08)}
.layout{display:grid;grid-template-columns:1fr 360px;height:calc(100vh - 52px)}
#map{width:100%;height:100%}
.layer-ctrl{position:absolute;top:68px;left:14px;z-index:100;display:flex;flex-direction:column;gap:5px}
.layer-btn{background:rgba(17,30,48,.93);border:1px solid var(--br);border-radius:8px;padding:6px 12px;color:var(--mt);font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;backdrop-filter:blur(6px);transition:.15s;white-space:nowrap;user-select:none}
.layer-btn.on{border-color:var(--g);color:var(--tx)}
.dot8{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rpanel{background:var(--cd);border-left:1px solid var(--br);overflow-y:auto;display:flex;flex-direction:column}
.rpanel::-webkit-scrollbar{width:4px}
.rpanel::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.ph{padding:13px;border-bottom:1px solid var(--br);background:var(--cd2);flex-shrink:0}
.pb{padding:13px;overflow-y:auto;flex:1}
.pcard{background:var(--cd2);border:1px solid var(--br);border-radius:8px;padding:11px;margin-bottom:8px;cursor:pointer;transition:.15s}
.pcard:hover{border-color:var(--mt)}
.chip{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;margin-right:3px;margin-bottom:3px;display:inline-block}
.chip-r{background:rgba(217,79,59,.12);color:#FF8080;border:1px solid rgba(217,79,59,.2)}
.chip-g{background:rgba(3,199,90,.12);color:var(--g);border:1px solid rgba(3,199,90,.2)}
.chip-b{background:rgba(28,110,242,.12);color:var(--bl);border:1px solid rgba(28,110,242,.2)}
.chip-y{background:rgba(232,168,56,.12);color:var(--gd);border:1px solid rgba(232,168,56,.2)}
.chip-p{background:rgba(139,92,246,.12);color:var(--pu);border:1px solid rgba(139,92,246,.2)}
.dlabel{font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.dcard{background:var(--cd2);border:1px solid var(--br);border-radius:8px;padding:11px;margin-bottom:8px}
.ch-row{display:flex;flex-direction:column;padding:6px 0;border-bottom:1px solid var(--br)}
.ch-row:last-child{border-bottom:none}
.ch-level{font-size:9px;color:var(--mt);margin-bottom:2px}
.ch-name{font-size:11px;font-weight:700}
.ch-note{font-size:9px;color:var(--mt)}
.tel-btn{background:rgba(28,110,242,.1);border:1px solid rgba(28,110,242,.2);border-radius:5px;padding:2px 8px;color:var(--bl);font-size:9px;font-weight:700;cursor:pointer;margin-top:3px;display:inline-block;text-decoration:none}

// ═══ 마커 생성 ═══
PINS.forEach(function(p){
  var img = mkImg(p.color, p.emoji, p.size);
  var marker = new kakao.maps.Marker({
    map: map,
    position: new kakao.maps.LatLng(p.lat, p.lng),
    image: img,
    title: p.title
  });
  kakao.maps.event.addListener(marker,'click',function(){
    showDetail(p);
  });
  layerMarkers[p.layer].push(marker);
});

// ═══ 레이어 토글 ═══
function toggleLayer(layer, btn){
  layerOn[layer] = !layerOn[layer];
  btn.classList.toggle('on', layerOn[layer]);
  layerMarkers[layer].forEach(function(m){
    m.setMap(layerOn[layer] ? map : null);
  });
}

// ═══ 상세 패널 ═══
function typeChip(t){
  if(t==='critical') return '<span class="chip chip-r">🔴 Critical</span>';
  if(t==='high') return '<span class="chip chip-y">🟠 High</span>';
  if(t==='medium') return '<span class="chip chip-y">🟡 Medium</span>';
  if(t==='facility') return '<span class="chip chip-g">🏢 시설</span>';
  if(t==='sangsaeng') return '<span class="chip chip-y">🤝 상생활동</span>';
  if(t==='square') return '<span class="chip chip-p">📚 스퀘어</span>';
  return '';
}

function showDetail(p){
  document.getElementById('emptyPanel').style.display='none';
  var d = document.getElementById('detailPanel');
  d.style.display='block';

  var tagsHtml = (p.tags||[]).map(function(t){
    return '<span class="chip chip-b">'+t+'</span>';
  }).join('');

  var chHtml = '';
  if(p.channels && p.channels.length){
    chHtml = '<div class="dcard"><div class="dlabel">📞 GR 채널</div>';
    p.channels.forEach(function(c){
      chHtml += '<div class="ch-row">'
        +'<div class="ch-level">'+c.level+'</div>'
        +'<div class="ch-name">'+c.name+'</div>'
        +(c.note?'<div class="ch-note">'+c.note+'</div>':'')
        +(c.tel?'<div style="margin-top:3px"><a class="tel-btn" href="tel:'+c.tel+'">📞 '+c.tel+'</a>'
          +'<span class="copy-btn" onclick="cp(\"'+c.tel+'\")" >복사</span></div>':'')
        +'</div>';
    });
    chHtml += '</div>';
  }

  d.innerHTML = '<div style="margin-bottom:12px">'
    +'<div style="font-size:16px;font-weight:900;margin-bottom:4px">'+p.title+'</div>'
    +'<div style="font-size:10px;color:var(--mt);margin-bottom:7px">📍 '+p.sub+'</div>'
    +'<div style="margin-bottom:7px">'+typeChip(p.type)+tagsHtml+'</div>'
    +(p.desc?'<div style="font-size:11px;color:var(--mt);line-height:1.7;background:var(--cd2);border-radius:7px;padding:9px;border:1px solid var(--br)">'+p.desc+'</div>':'')
    +'</div>'
    +chHtml
    +(p.channels&&p.channels.length
      ?'<button class="btn-ai" onclick="goAI()">🤖 AI에게 이 지역 GR 전략 질문</button>'
      :'');
}

function goAI(title){
  window.open('index.html','_blank');
}
function cp(t){
  navigator.clipboard.writeText(t).catch(function(){
    var el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
  });
  showToast(t+' 복사됨');
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}
</script>
