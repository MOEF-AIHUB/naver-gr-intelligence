<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAVER GR 전국 지도</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{--g:#03C75A;--bl:#1C6EF2;--rd:#D94F3B;--gd:#E8A838;--pu:#8B5CF6;--teal:#0EA5E9;--bg:#0A1628;--cd:#111E30;--cd2:#162030;--br:#1E3048;--tx:#D8E8F5;--mt:#5A7A9A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:13px;min-height:100vh}
header{background:#0A1628;border-bottom:1px solid var(--br);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-n{background:linear-gradient(135deg,#03C75A,#00A847);color:#fff;font-weight:900;font-size:15px;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.back-btn{background:var(--cd);border:1px solid var(--br);border-radius:7px;padding:5px 12px;color:var(--mt);font-size:11px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px}
.back-btn:hover{color:var(--g);border-color:var(--g)}
.layout{display:grid;grid-template-columns:1fr 380px;height:calc(100vh - 52px);overflow:hidden}
@media(max-width:1000px){.layout{grid-template-columns:1fr}}
/* MAP AREA */
.map-area{position:relative;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center}
.map-svg{width:100%;height:100%;max-width:700px}
/* REGION */
.region{fill:#1A2535;stroke:#243244;stroke-width:1;cursor:pointer;transition:.2s}
.region:hover{fill:#243244;stroke:var(--g);stroke-width:1.5}
.region.highlight{fill:rgba(3,199,90,.12);stroke:var(--g);stroke-width:2}
/* NAVER PINS */
.naver-pin{cursor:pointer;filter:drop-shadow(0 0 6px rgba(3,199,90,.6))}
.naver-pin:hover{filter:drop-shadow(0 0 12px rgba(3,199,90,.9))}
.pin-hq{fill:#03C75A}
.pin-dc{fill:#1C6EF2}
.pin-office{fill:#E8A838}
.pin-lab{fill:#8B5CF6}
.pin-global{fill:#0EA5E9}
/* TOOLTIP */
.tooltip{position:absolute;background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:14px;min-width:280px;max-width:360px;pointer-events:none;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none}
.tooltip.show{display:block}
.tt-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.tt-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700}
.tt-section{margin-bottom:8px}
.tt-label{font-size:9px;color:var(--mt);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.tt-item{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid var(--br);font-size:10px}
.tt-item:last-child{border-bottom:none}
.tt-role{font-size:9px;color:var(--mt);min-width:60px;flex-shrink:0}
.tt-name{font-weight:600}
.tt-party{font-size:9px;margin-left:4px}
.tt-issues{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tt-issue{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600}
/* RIGHT PANEL */
.right-panel{background:var(--cd);border-left:1px solid var(--br);overflow-y:auto;display:flex;flex-direction:column}
.right-panel::-webkit-scrollbar{width:4px}
.right-panel::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.panel-header{padding:14px;border-bottom:1px solid var(--br);position:sticky;top:0;background:var(--cd);z-index:10}
.panel-body{padding:14px;flex:1}
/* LEGEND */
.legend{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:11px}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
/* FILTER */
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.fb{background:var(--cd2);border:1px solid var(--br);border-radius:12px;padding:3px 9px;color:var(--mt);font-size:10px;cursor:pointer}
.fb.on{border-color:var(--g);color:var(--g);background:rgba(3,199,90,.08)}
/* LOCATION CARDS */
.loc-card{background:var(--cd2);border:1px solid var(--br);border-radius:8px;padding:11px;margin-bottom:8px;cursor:pointer;transition:.15s}
.loc-card:hover{border-color:var(--g)}
.loc-card.active{border-color:var(--g);background:rgba(3,199,90,.06)}
.loc-title{font-size:12px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.loc-type{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700}
.loc-addr{font-size:10px;color:var(--mt);margin-bottom:6px}
.loc-issues{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.loc-issue{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600}
.loc-channels{font-size:10px;color:var(--mt);border-top:1px solid var(--br);padding-top:6px;margin-top:2px;line-height:1.7}
/* CHANNEL SECTION */
.channel-card{background:rgba(3,199,90,.05);border:1px solid rgba(3,199,90,.2);border-radius:8px;padding:11px;margin-top:10px}
.channel-title{font-size:11px;font-weight:700;color:var(--g);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.channel-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(3,199,90,.1);font-size:10px}
.channel-item:last-child{border-bottom:none}
.channel-level{min-width:65px;color:var(--mt);font-size:9px;flex-shrink:0}
.channel-name{font-weight:600}
.channel-sub{font-size:9px;color:var(--mt);margin-top:1px}
/* MEMBERS SECTION */
.members-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.mem-mini{background:var(--cd2);border:1px solid var(--br);border-radius:6px;padding:7px;font-size:10px}
.mem-mini-name{font-weight:700;margin-bottom:2px}
.mem-mini-role{font-size:9px;color:var(--mt)}
/* COMMITTEE SECTION */
.cmit-section{margin-bottom:12px}
.cmit-header{font-size:10px;font-weight:700;color:var(--mt);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--br)}
.mem-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--br);font-size:10px}
.mem-row:last-child{border-bottom:none}
.mem-badge{font-size:8px;padding:1px 5px;border-radius:6px;font-weight:700;white-space:nowrap}
.badge-d{background:rgba(33,150,243,.2);color:#2196F3}
.badge-p{background:rgba(244,67,54,.2);color:#F44336}
.badge-o{background:rgba(156,39,176,.2);color:#9C27B0}
.badge-s{background:rgba(90,122,154,.2);color:var(--mt)}
hr{border:none;border-top:1px solid var(--br);margin:10px 0}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--br);font-size:10px}
.stat-row:last-child{border-bottom:none}
.stat-val{font-weight:700}
</style>
</head>
<body>

  <div class="logo">

      <div style="font-size:13px;font-weight:700">GR 전국 지도</div>

  </div>
  <a href="index.html" class="back-btn">← 메인으로</a>
</header>

<div class="layout">

let selectedLoc = null;

let panelMode = 'all';

// ═══ INIT ═══
function init(){
  renderLocationList();
  renderCmitSummary();
}

function renderLocationList(){
  const locs = Object.entries(LOCATIONS);
  document.getElementById('locationList').innerHTML = locs.map(([key,loc])=>`
    <div class="loc-card" id="lc-${key}" onclick="selectLocation('${key}')">
      <div class="loc-title">
        <span style="width:8px;height:8px;border-radius:50%;background:${loc.typeColor};flex-shrink:0;display:inline-block"></span>
        ${loc.name}
        <span class="loc-type" style="background:${loc.typeColor}22;color:${loc.typeColor};border:1px solid ${loc.typeColor}44">${loc.typeLabel}</span>
      </div>
      <div class="loc-addr">📍 ${loc.address}</div>
      <div class="loc-issues">
        ${loc.issues.map(i=>`<span class="loc-issue" style="background:rgba(217,79,59,.1);color:#FF8080;border:1px solid rgba(217,79,59,.2)">${i}</span>`).join('')}
      </div>
    </div>`).join('');
}

function renderCmitSummary(){
  const grCmits = ['정무위','과방위','문체위','외통위'];
  document.getElementById('cmitSummary').innerHTML = grCmits.map(k=>{
    const c = COMMITTEES_22[k];
    const chairText = c.chair;
    const cnt = c.members.length;
    const dCnt = c.members.filter(m=>m.badge==='d').length;
    const pCnt = c.members.filter(m=>m.badge==='p').length;
    const oCnt = c.members.filter(m=>m.badge==='o').length;
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--br);cursor:pointer" onclick="showCmitDetail('${k}')">
      <div style="flex:1">
        <div style="font-size:11px;font-weight:700">${k}</div>
        <div style="font-size:9px;color:var(--mt)">위원장: ${chairText} · 총 ${cnt}인</div>
      </div>
      <div style="display:flex;gap:3px">
        <span style="font-size:9px;padding:1px 5px;border-radius:6px;background:rgba(33,150,243,.2);color:#2196F3">민 ${dCnt}</span>
        <span style="font-size:9px;padding:1px 5px;border-radius:6px;background:rgba(244,67,54,.2);color:#F44336">국 ${pCnt}</span>
        ${oCnt>0?`<span style="font-size:9px;padding:1px 5px;border-radius:6px;background:rgba(156,39,176,.2);color:#9C27B0">기 ${oCnt}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ═══ SELECT LOCATION ═══
function selectLocation(key){
  const loc = LOCATIONS[key];
  if(!loc) return;
  // 이전 선택 해제
  document.querySelectorAll('.loc-card').forEach(c=>c.classList.remove('active'));
  const card = document.getElementById('lc-'+key);
  if(card) card.classList.add('active');
  // 지역 하이라이트
  document.querySelectorAll('.region').forEach(r=>r.classList.remove('highlight'));
  const regionEl = document.getElementById('r-'+loc.region);
  if(regionEl) regionEl.classList.add('highlight');
  // 패널 업데이트
  showLocationDetail(loc);
}

function showLocationDetail(loc){
  document.getElementById('defaultPanel').style.display='none';
  document.getElementById('detailPanel').style.display='block';
  const channelHtml = loc.channels.map(ch=>`
    <div class="channel-item">
      <div class="channel-level">${ch.level}</div>
      <div>
        <div class="channel-name">${ch.name}</div>
        <div class="channel-sub">${ch.person} · ☎ ${ch.tel}</div>
        ${ch.note?`<div class="channel-sub" style="color:var(--g)">${ch.note}</div>`:''}
      </div>
    </div>`).join('');
  document.getElementById('detailPanel').innerHTML=`
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:12px">
      <div style="width:10px;height:10px;border-radius:50%;background:${loc.typeColor}"></div>
      <div style="font-size:13px;font-weight:700">${loc.name}</div>
      <span style="font-size:9px;padding:2px 7px;border-radius:10px;background:${loc.typeColor}22;color:${loc.typeColor};border:1px solid ${loc.typeColor}44;font-weight:700">${loc.typeLabel}</span>
    </div>
    <div style="font-size:10px;color:var(--mt);margin-bottom:6px">📍 ${loc.address}</div>
    <div style="font-size:11px;color:var(--tx);line-height:1.7;margin-bottom:10px;background:var(--cd2);border-radius:7px;padding:10px">${loc.desc}</div>
    <div style="margin-bottom:10px">
      <div style="font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">🚨 관련 규제 이슈</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">${loc.issues.map(i=>`<span style="font-size:10px;padding:3px 8px;border-radius:8px;background:rgba(217,79,59,.1);color:#FF8080;border:1px solid rgba(217,79,59,.2);font-weight:600">${i}</span>`).join('')}</div>
    </div>
    <div class="channel-card">
      <div class="channel-title">📞 즉시 연락 가능한 GR 채널</div>
      ${channelHtml}
    </div>
    <div style="margin-top:10px">
      <button onclick="showRegionDetail('${loc.region}')" style="width:100%;background:var(--cd2);border:1px solid var(--br);border-radius:7px;padding:8px;color:var(--mt);font-size:10px;cursor:pointer">🗺 ${REGIONS[loc.region]?.name||''} 지역 전체 GR 채널 보기 →</button>
    </div>
    <div style="margin-top:8px">
      <button onclick="showDefaultPanel()" style="width:100%;background:none;border:none;color:var(--mt);font-size:10px;cursor:pointer">← 전체 목록으로</button>
    </div>`;
}

// ═══ SELECT REGION ═══
function selectRegion(key){
  document.querySelectorAll('.region').forEach(r=>r.classList.remove('highlight'));
  const regionEl = document.getElementById('r-'+key);
  if(regionEl) regionEl.classList.add('highlight');
  showRegionDetail(key);
}

        <div class="channel-item">
          <div class="channel-level">기초단체</div>
          <div>
            <div class="channel-name">${g.title}</div>
            <div class="channel-sub">${g.name} (${g.party})</div>
          </div>
        </div>`).join('')}
    </div>
    <div style="margin-top:10px">
      <div style="font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">🏛 지역구 국회의원</div>
      ${assemblyHtml}
    </div>
    <div style="margin-top:10px">
      <div style="font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;margin-bottom:5px">🚨 지역 핵심 GR 이슈</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">${reg.keyIssues.map(i=>`<span style="font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(232,168,56,.1);color:var(--gd);border:1px solid rgba(232,168,56,.2);font-weight:600">${i}</span>`).join('')}</div>
    </div>
    <div style="margin-top:10px">
      <button onclick="showDefaultPanel()" style="width:100%;background:none;border:none;color:var(--mt);font-size:10px;cursor:pointer">← 전체 목록으로</button>
    </div>`;
}

// ═══ COMMITTEE DETAIL ═══
function showCmitDetail(key){
  const c = COMMITTEES_22[key];
  if(!c) return;
  document.getElementById('defaultPanel').style.display='none';
  document.getElementById('detailPanel').style.display='block';
  const memberHtml = c.members.map(m=>`
    <div class="mem-row">
      <span class="mem-badge badge-${m.badge}">${m.party}</span>
      <span style="font-weight:${m.role.includes('△')?700:400}">${m.name}</span>
      <span style="font-size:9px;color:var(--mt);margin-left:auto">${m.role}</span>
    </div>`).join('');
  document.getElementById('detailPanel').innerHTML=`
    <div style="font-size:13px;font-weight:700;margin-bottom:4px">${key}</div>
    <div style="font-size:10px;color:var(--mt);margin-bottom:12px">위원장: ${c.chair} · 전체 ${c.members.length}인</div>
    <div style="max-height:420px;overflow-y:auto;scrollbar-width:thin">
      ${memberHtml}
    </div>
    <div style="margin-top:10px">
      <button onclick="showDefaultPanel()" style="width:100%;background:none;border:none;color:var(--mt);font-size:10px;cursor:pointer">← 전체 목록으로</button>
    </div>`;
}

function showDefaultPanel(){
  document.getElementById('defaultPanel').style.display='block';
  document.getElementById('detailPanel').style.display='none';
  document.querySelectorAll('.region').forEach(r=>r.classList.remove('highlight'));
  document.querySelectorAll('.loc-card').forEach(c=>c.classList.remove('active'));
}

function filterPanel(f,el){
  panelMode = f;
  document.querySelectorAll('.filter-row .fb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(f==='member'){
    document.getElementById('defaultPanel').style.display='none';
    document.getElementById('detailPanel').style.display='block';
    showAllMembers();
  } else {
    showDefaultPanel();
  }
}

function showAllMembers(){
  const grCmits = ['정무위','과방위','문체위','외통위','법사위','기재위','산자중기위'];
  document.getElementById('detailPanel').innerHTML=`
    <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--g)">🏛 22대 국회 GR 핵심 위원회 전체 명단</div>
    ${grCmits.map(k=>{
      const c=COMMITTEES_22[k];if(!c)return'';
      return `<div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:var(--mt);border-bottom:2px solid var(--br);padding-bottom:4px;margin-bottom:6px;display:flex;justify-content:space-between">
          <span>${k}</span><span style="font-size:9px">위원장: ${c.chair}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
          ${c.members.map(m=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;padding:3px 0">
            <span class="mem-badge badge-${m.badge}" style="font-size:8px">${m.party}</span>
            <span style="font-weight:${m.role.includes('△')?700:400}">${m.name}</span>
            ${m.role.includes('△')?`<span style="font-size:8px;color:var(--g)">간사</span>`:''}
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}`;
}

init();
</script>
</body>
</html>
